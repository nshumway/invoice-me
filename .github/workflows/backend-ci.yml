name: Backend CI/CD

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'pom.xml'

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: invoiceme_test
          POSTGRES_USER: invoiceme
          POSTGRES_PASSWORD: invoiceme
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/invoiceme_test?user=invoiceme&password=invoiceme

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-me-jar
          path: target/*.jar
          retention-days: 7
