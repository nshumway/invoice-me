spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/invoiceme_test?user=invoiceme&password=invoiceme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: test-secret-key-for-integration-tests-only-min-32-chars
  expiration: 86400000
