# Render Blueprint for InvoiceMe Backend
# This file configures automatic deployment to Render using Docker

services:
  # Spring Boot Backend (Docker)
  - type: web
    name: invoiceme-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false  # Set manually - use your Neon connection string
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8080

# Note: We use Neon for PostgreSQL (free tier), so no database defined here
