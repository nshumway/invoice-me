# Render Blueprint for InvoiceMe Backend
# This file configures automatic deployment to Render

services:
  # Spring Boot Backend
  - type: web
    name: invoiceme-backend
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/invoice-me-0.0.1-SNAPSHOT.jar
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx512m
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: invoiceme-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  # PostgreSQL Database
  - name: invoiceme-db
    databaseName: invoiceme
    plan: free
    user: invoiceme
