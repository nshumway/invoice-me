services:
  postgres:
    image: postgres:15
    container_name: invoiceme-postgres
    environment:
      POSTGRES_DB: invoiceme
      POSTGRES_USER: invoiceme
      POSTGRES_PASSWORD: invoiceme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoiceme"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
